name: Refresh course data

on:
  schedule:
    - cron: '0 13 * * 1'   # Monday 13:00 UTC — adjust if a different day/time is preferred
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Refresh current + next term data
        run: python3 scripts/refresh_terms.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/graph.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh course data ($(date -u +%Y-%m-%d))"
            git push
          fi
